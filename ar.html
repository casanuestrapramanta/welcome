<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Nuestra - My Custom AR Map</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene xr-mode-ui="XRMode: xr" webxr="optionalFeatures: hit-test;">
        
        <a-assets>
            <a-asset-item id="my-mountain" src="./models/tzoumerka.glb"></a-asset-item>
        </a-assets>

        <a-entity 
            gltf-model="#my-mountain" 
            position="0 0.5 -2" 
            scale="0.2 0.2 0.2"
            material="color: #8B5A2B;" 
            animation="property: rotation; to: 0 360 0; loop: true; dur: 20000">
            
            <a-text 
                value="⛰️ TZOUMERKA 3D MAP\nCasa Nuestra Premium Experience" 
                position="0 1.5 0" 
                color="#FFD700" 
                align="center"
                scale="1.5 1.5 1.5">
            </a-text>

        </a-entity>

        <a-light type="ambient" color="#fff" intensity="1"></a-light>
        <a-light type="directional" color="#fff" intensity="0.8" position="-1 3 1"></a-light>

    </a-scene>

</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Nuestra - AR Stable Mesh Test</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene xr-mode-ui="XRMode: xr" webxr="optionalFeatures: hit-test;">
        
        <a-assets>
            <a-asset-item id="clean-model" src="https://aframe.io/aframe/examples/boilerplate/hello-world/models/triceratops.glb"></a-asset-item>
        </a-assets>

        <a-entity 
            gltf-model="#clean-model" 
            position="0 0.2 -2" 
            scale="0.5 0.5 0.5"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 12000">
            
            <a-text 
                value="⛰️ ΤΖΟΥΜΕΡΚΑ\n3D MAP MODEL" 
                position="0 2.5 0" 
                color="#00FFCC" 
                align="center"
                scale="2 2 2">
            </a-text>

        </a-entity>

        <a-light type="ambient" color="#fff" intensity="1"></a-light>
        <a-light type="directional" color="#fff" intensity="0.8" position="-1 3 1"></a-light>

    </a-scene>

</body>
</html>

<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Nuestra - AR Mountain Map Test</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene xr-mode-ui="XRMode: xr" webxr="optionalFeatures: hit-test;">
        
        <a-assets>
            <a-asset-item id="mountain-mesh" src="https://gftruj.github.io/webxr-samples/media/gltf/space/space.gltf"></a-asset-item>
        </a-assets>

        <a-entity 
            gltf-model="#mountain-mesh" 
            position="0 0.5 -2" 
            scale="0.2 0.2 0.2"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 15000">
            
            <a-text 
                value="⛰️ Strogoula Peak\n2.112m" 
                position="0 3 0" 
                color="#00FFCC" 
                align="center"
                scale="2 2 2">
            </a-text>

        </a-entity>

        <a-light type="ambient" color="#fff" intensity="0.8"></a-light>
        <a-light type="directional" color="#fff" intensity="0.6" position="-1 3 1"></a-light>

    </a-scene>

</body>
</html>
